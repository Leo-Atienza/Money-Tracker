name: budget_tracker
description: A minimalistic money tracking app

publish_to: 'none'

version: 5.1.2+11

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.3
  # Phase 6.1: at-rest SQLCipher (AES-256) encryption on Android/iOS/macOS.
  # Reuses sqflite_common, so it coexists with sqflite + the sqflite_common_ffi
  # desktop/test factory. Driven via lib/database/db_open.dart.
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.0

  # File & Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  file_picker: ^10.3.8
  permission_handler: ^11.3.1

  # UI & Charts
  fl_chart: ^1.1.1
  intl: ^0.20.2

  # Sharing & Export
  share_plus: ^12.0.1
  pdf: ^3.11.1

  # Notifications (100% FREE, Local only!)
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.1

  # App Settings (for opening notification settings)
  app_settings: ^7.0.0

  cupertino_icons: ^1.0.8
  decimal: ^3.2.4
  crypto: ^3.0.5

  # Phase 6.3: AES-GCM + PBKDF2 for encrypted backup envelopes.
  cryptography: ^2.7.0

  # Reads version+build from native bundle (instead of hardcoding).
  package_info_plus: ^8.0.0

  # Phase 6.2: Keystore-backed PIN hash + salt storage. Falls back to
  # encryptedSharedPreferences on older Android API levels.
  flutter_secure_storage: ^9.2.2

  # Home Screen Widget (FREE!)
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # In-memory SQLite for integration tests (Phase 3b).
  sqflite_common_ffi: ^2.3.3

  # Stage D.2: used by `test/screens/notification_settings_screen_test.dart`
  # to register a fake platform implementation via MockPlatformInterfaceMixin
  # so the `late final FlutterLocalNotificationsPlatform.instance` doesn't
  # throw on first access during widget tests. Both packages are transitive
  # dependencies of `flutter_local_notifications`; declaring them here
  # silences the `depend_on_referenced_packages` analyzer info without
  # changing runtime behaviour.
  flutter_local_notifications_platform_interface: ^9.1.0
  plugin_platform_interface: ^2.0.0

flutter:
  uses-material-design: true

  # Phase 2.3: Hanken Grotesk bundled as a variable font (wght axis).
  # The wght axis is driven via FontVariation in
  # `lib/theme/luminous_app_theme.dart` so we keep a single asset (~130 KB)
  # instead of four static weights (~320 KB).
  fonts:
    - family: HankenGrotesk
      fonts:
        - asset: assets/fonts/HankenGrotesk/HankenGrotesk-Variable.ttf